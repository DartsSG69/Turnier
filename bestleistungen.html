<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SG69 Flight Night – Bestleistungen</title>
  <style>
    :root {
      --bg: #050b22;
      --text: #ffffff;
      --overlay-dark: rgba(3, 8, 24, 0.62);
      --overlay-blue: rgba(21, 49, 130, 0.24);

      --card-bg: rgba(8, 18, 46, 0.84);
      --card-border: rgba(134, 170, 255, 0.18);
      --panel-bg: rgba(25, 31, 45, 0.9);
      --header-blue: linear-gradient(135deg, #2f63ff 0%, #4a7eff 100%);
      --row-border: rgba(255,255,255,0.08);
      --gold: #ffd54a;
      --silver: #d9e2f2;
      --bronze: #d99b61;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
    }

    body {
      min-height: 100vh;
      color: var(--text);
    }

    .hero {
      position: relative;
      min-height: 100vh;
      isolation: isolate;
      background-image:
        linear-gradient(180deg, var(--overlay-dark), rgba(4, 10, 30, 0.84)),
        radial-gradient(circle at center, transparent 0%, rgba(2, 7, 22, 0.30) 55%, rgba(2, 7, 22, 0.74) 100%),
        linear-gradient(135deg, var(--overlay-blue), transparent 45%),
        url("sg_flight_night_hintergrundbild.png");
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      padding: 18px 16px 20px;
    }

    .shell {
      width: min(1800px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 12px;
      min-height: calc(100vh - 38px);
    }

    .hero-heading-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      padding-top: 2px;
    }

    .hero-heading {
      margin: 0;
      display: inline-block;
      white-space: nowrap;
      text-align: center;
      text-transform: uppercase;
      font-style: italic;
      font-weight: 900;
      letter-spacing: 0.04em;
      line-height: 0.9;
      font-size: clamp(1.8rem, 4.2vw, 4rem);
      color: #ffffff;
      padding: 0;
      transform: skewX(-10deg) rotate(-2deg);
      background: transparent;
      text-shadow:
        0 4px 14px rgba(0,0,0,0.45),
        0 2px 0 rgba(255,255,255,0.06);
    }

    .top-nav {
      display: flex;
      justify-content: flex-start;
      margin: 0;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 13px;
      border-radius: 999px;
      text-decoration: none;
      color: #ffffff;
      font-size: 0.9rem;
      font-weight: 700;
      background: rgba(8, 18, 46, 0.72);
      border: 1px solid rgba(134, 170, 255, 0.22);
      backdrop-filter: blur(10px);
      box-shadow:
        0 8px 20px rgba(0, 0, 0, 0.22),
        inset 0 1px 0 rgba(255,255,255,0.05);
      transition:
        transform 0.18s ease,
        background 0.18s ease,
        border-color 0.18s ease;
    }

    .back-link:hover {
      transform: translateY(-1px);
      background: rgba(33, 72, 190, 0.85);
      border-color: rgba(170, 195, 255, 0.35);
    }

    .performance-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      align-items: start;
    }

    .performance-card {
      background: var(--card-bg);
      border-radius: 20px;
      overflow: hidden;
      box-shadow:
        0 16px 32px rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255,255,255,0.04);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(12px);
      position: relative;
      min-width: 0;
    }

    .performance-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent 22%);
      pointer-events: none;
    }

    .performance-head {
      background: var(--header-blue);
      padding: 12px 14px 10px;
      text-align: center;
    }

    .performance-title {
      font-size: 1.02rem;
      font-weight: 900;
      line-height: 1.1;
    }

    .performance-subtitle {
      font-size: 0.72rem;
      font-weight: 700;
      opacity: 0.95;
      margin-top: 2px;
    }

    .performance-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 90px 70px;
      align-items: center;
      min-width: 0;
      background: var(--panel-bg);
      border-bottom: 1px solid var(--row-border);
    }

    .performance-row:nth-child(even) {
      background: rgba(31, 43, 69, 0.92);
    }

    .performance-row:last-child {
      border-bottom: none;
    }

    .cell {
      padding: 10px 8px;
      border-right: 1px solid var(--row-border);
      text-align: center;
      font-size: 0.86rem;
      line-height: 1.1;
      min-width: 0;
    }

    .cell:last-child {
      border-right: none;
    }

    .name {
      text-align: left;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .name.gold,
    .name.silver,
    .name.bronze {
      color: inherit;
    }

    .value {
      font-weight: 900;
      font-size: 1rem;
    }

    .count {
      opacity: 0.9;
      font-weight: 700;
    }

    .footer-status {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      color: #e5e8ef;
      font-size: 0.88rem;
      flex-wrap: wrap;
      text-align: center;
      padding-top: 2px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: #81ffb1;
      box-shadow: 0 0 12px rgba(129, 255, 177, 0.8);
    }

    .empty {
      padding: 24px;
      text-align: center;
      color: #d0d4db;
      background: rgba(7, 18, 50, 0.9);
      border-radius: 20px;
      grid-column: 1 / -1;
    }

    @media (max-width: 1200px) {
      .performance-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 760px) {
      body {
        overflow-x: hidden;
      }

      .hero {
        padding: 16px 10px 20px;
      }

      .hero-heading {
        font-size: clamp(1.4rem, 8vw, 2.6rem);
        white-space: normal;
        line-height: 0.95;
      }

      .performance-grid {
        grid-template-columns: 1fr;
      }

      .performance-row {
        grid-template-columns: minmax(0, 1fr) 78px 58px;
      }

      .cell {
        font-size: 0.8rem;
        padding: 9px 6px;
      }
    }
  </style>
</head>
<body>
  <section class="hero" aria-label="Kalle's Flight Night Bestleistungen">
    <div class="shell">
      <div class="hero-heading-wrap">
        <h1 class="hero-heading">SG69 Flight Night - Performance</h1>
      </div>

      <div class="top-nav">
        <a class="back-link" href="index.html">← Zurück</a>
      </div>

      <div class="performance-grid" id="performance-grid"></div>

      <div class="footer-status">
        <span class="dot"></span>
        <span id="status-text">Bestleistungen werden geladen …</span>
        <span>•</span>
        <span id="last-updated">Noch kein Update</span>
      </div>
    </div>
  </section>

  <script>
    const PERFORMANCE_URL = "/api/performance";
    const REFRESH_MS = 5000;

    const gridEl = document.getElementById("performance-grid");
    const statusTextEl = document.getElementById("status-text");
    const lastUpdatedEl = document.getElementById("last-updated");

    function getSubtitle(item) {
      const min = item.min ?? "-";
      const max = item.max ?? "-";
      return `${item.performanceTypeCd || ""} • ${min} - ${max}`;
    }

    function getPlayerName(row) {
      return (
        row?.participant?.displayName ||
        row?.performancePlayers?.[0]?.player?.displayName ||
        "-"
      );
    }

    function sortRows(item) {
      const rows = [...(item.playerPerformances || [])];
      const asc = item.performanceTypeCd === "SG";
      return rows.sort((a, b) => {
        const av = Number(a.value ?? 0);
        const bv = Number(b.value ?? 0);
        return asc ? av - bv : bv - av;
      });
    }

    function getNameClass(index) {
      if (index === 0) return "name gold";
      if (index === 1) return "name silver";
      if (index === 2) return "name bronze";
      return "name";
    }

    function renderCard(item) {
      const rows = sortRows(item).slice(0, 10);

      return `
        <article class="performance-card">
          <div class="performance-head">
            <div class="performance-title">${item.name || "-"}</div>
            <div class="performance-subtitle">${getSubtitle(item)}</div>
          </div>

          ${rows.map((row, index) => `
            <div class="performance-row">
              <div class="cell ${getNameClass(index)}" title="${getPlayerName(row)}">${getPlayerName(row)}</div>
              <div class="cell value">${row.value ?? "-"}</div>
              <div class="cell count">x${row.count ?? 1}</div>
            </div>
          `).join("")}
        </article>
      `;
    }

    async function loadPerformances() {
      try {
        statusTextEl.textContent = "Bestleistungen werden geladen …";

        const response = await fetch(PERFORMANCE_URL, {
          headers: { Accept: "application/json" }
        });

        const text = await response.text();
        const json = JSON.parse(text);

        const catalog = json?.performanceCatalog || [];

        if (!catalog.length) {
          gridEl.innerHTML = `<div class="empty">Keine Bestleistungen gefunden.</div>`;
          statusTextEl.textContent = "Keine Bestleistungen gefunden";
          lastUpdatedEl.textContent = `Letztes Update: ${new Date().toLocaleTimeString("de-DE")}`;
          return;
        }

        gridEl.innerHTML = catalog.map(renderCard).join("");
        statusTextEl.textContent = `${catalog.length} Kategorien geladen`;
        lastUpdatedEl.textContent = `Letztes Update: ${new Date().toLocaleTimeString("de-DE")}`;
      } catch (error) {
        statusTextEl.textContent = "Bestleistungen konnten nicht geladen werden";
        lastUpdatedEl.textContent = error.message;
        gridEl.innerHTML = `<div class="empty">Fehler beim Laden der Bestleistungen.<br>${error.message}</div>`;
      }
    }

    loadPerformances();
    setInterval(loadPerformances, REFRESH_MS);
  </script>
</body>
</html>
