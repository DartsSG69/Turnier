<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SG69 Flight Night</title>
  <style>
    :root {
      --bg: #050b22;
      --text: #ffffff;
      --overlay-dark: rgba(3, 8, 24, 0.28);
      --overlay-blue: rgba(21, 49, 130, 0.12);
      --button-bg: rgba(8, 18, 46, 0.82);
      --button-border: rgba(134, 170, 255, 0.22);
      --button-hover: rgba(33, 72, 190, 0.88);
      --button-text: #ffffff;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
    }

    body {
      min-height: 100vh;
      color: var(--text);
    }

    .hero {
      position: relative;
      min-height: 100vh;
      isolation: isolate;
      background-image:
        linear-gradient(180deg, var(--overlay-dark), rgba(4, 10, 30, 0.36)),
        radial-gradient(circle at center, transparent 0%, rgba(2, 7, 22, 0.10) 55%, rgba(2, 7, 22, 0.30) 100%),
        linear-gradient(135deg, var(--overlay-blue), transparent 45%),
        url("sg_flight_night_hintergrundbild.png");
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      padding: 28px 22px 40px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .shell {
      width: min(1400px, 100%);
      min-height: calc(100vh - 80px);
      margin: 0 auto;
      display: grid;
      align-items: end;
    }

    .menu {
      display: grid;
      place-items: center;
      padding-bottom: 20px;
    }

    .menu-buttons {
      width: min(1100px, 100%);
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .menu-button {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 88px;
      padding: 20px 28px;
      border-radius: 22px;
      text-decoration: none;
      color: var(--button-text);
      background: var(--button-bg);
      border: 1px solid var(--button-border);
      backdrop-filter: blur(12px);
      box-shadow:
        0 18px 40px rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255,255,255,0.05);
      font-size: clamp(1.15rem, 1.8vw, 1.7rem);
      font-weight: 800;
      letter-spacing: 0.02em;
      transition:
        transform 0.18s ease,
        background 0.18s ease,
        border-color 0.18s ease,
        box-shadow 0.18s ease;
    }

    .menu-button:hover {
      transform: translateY(-2px);
      background: var(--button-hover);
      border-color: rgba(170, 195, 255, 0.38);
      box-shadow:
        0 22px 46px rgba(0, 0, 0, 0.34),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .menu-button:active {
      transform: translateY(0);
    }

    @media (max-width: 900px) {
      .hero {
        padding: 20px 12px 28px;
      }

      .menu-buttons {
        grid-template-columns: 1fr;
      }

      .menu-button {
        min-height: 74px;
        font-size: 1.15rem;
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>
  <section class="hero" aria-label="Kalle's Flight Night Navigation">
    <div class="shell">
      <div class="menu">
        <div class="menu-buttons">
          <a class="menu-button" href="livescore.html">Live Score</a>
          <a class="menu-button" href="livetabelle.html">Live Tabelle</a>
          <a class="menu-button" href="bestleistungen.html">Bestleistungen</a>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
