<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SG69 Flight Night</title>
  <style>
    :root {
      --bg: #050b22;
      --text: #ffffff;
      --overlay-dark: rgba(3, 8, 24, 0.28);
      --overlay-blue: rgba(21, 49, 130, 0.12);
      --button-bg: rgba(8, 18, 46, 0.82);
      --button-border: rgba(134, 170, 255, 0.22);
      --button-hover: rgba(33, 72, 190, 0.88);
      --button-text: #ffffff;
      --sub-button-bg: rgba(255, 255, 255, 0.13);
      --sub-button-border: rgba(255, 255, 255, 0.28);
      --sub-button-hover: rgba(255, 255, 255, 0.24);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
    }

    body {
      min-height: 100vh;
      color: var(--text);
    }

    .hero {
      position: relative;
      min-height: 100vh;
      isolation: isolate;
      background-image:
        linear-gradient(180deg, var(--overlay-dark), rgba(4, 10, 30, 0.36)),
        radial-gradient(circle at center, transparent 0%, rgba(2, 7, 22, 0.10) 55%, rgba(2, 7, 22, 0.30) 100%),
        linear-gradient(135deg, var(--overlay-blue), transparent 45%),
        url("sg_flight_night_hintergrundbild.png");
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      padding: 28px 22px 40px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .shell {
      width: min(1400px, 100%);
      min-height: calc(100vh - 80px);
      margin: 0 auto;
      display: grid;
      align-items: end;
    }

    .menu {
      display: grid;
      place-items: center;
      padding-bottom: 20px;
      width: 100%;
    }

    .menu-groups {
      width: min(1100px, 100%);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      align-items: start;
      gap: 18px;
    }

    .menu-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .menu-button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 88px;
      padding: 20px 28px;
      border-radius: 22px;
      text-decoration: none;
      color: var(--button-text);
      background: var(--button-bg);
      border: 1px solid var(--button-border);
      backdrop-filter: blur(12px);
      box-shadow:
        0 18px 40px rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255,255,255,0.05);
      font-size: clamp(1.15rem, 1.8vw, 1.7rem);
      font-weight: 800;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition:
        transform 0.18s ease,
        background 0.18s ease,
        border-color 0.18s ease,
        box-shadow 0.18s ease;
    }

    button.menu-button {
      font-family: inherit;
    }

    .main-button {
      min-height: 96px;
      font-size: clamp(1.35rem, 2.3vw, 2rem);
      text-transform: uppercase;
    }

    .submenu {
      display: none;
      grid-template-columns: 1fr;
      gap: 10px;
      animation: fadeIn 0.18s ease;
    }

    .submenu.is-open {
      display: grid;
    }

    .submenu .menu-button {
      min-height: 58px;
      padding: 14px 20px;
      border-radius: 16px;
      background: var(--sub-button-bg);
      border-color: var(--sub-button-border);
      font-size: clamp(0.95rem, 1.35vw, 1.18rem);
      font-weight: 700;
      text-transform: none;
      letter-spacing: 0.01em;
      box-shadow:
        0 10px 22px rgba(0, 0, 0, 0.20),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .menu-button:hover,
    .main-button.is-active {
      transform: translateY(-2px);
      background: var(--button-hover);
      border-color: rgba(170, 195, 255, 0.38);
      box-shadow:
        0 22px 46px rgba(0, 0, 0, 0.34),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .submenu .menu-button:hover {
      background: var(--sub-button-hover);
      border-color: rgba(255, 255, 255, 0.42);
      box-shadow:
        0 14px 28px rgba(0, 0, 0, 0.24),
        inset 0 1px 0 rgba(255,255,255,0.12);
    }

    .menu-button:active {
      transform: translateY(0);
    }

    .menu-button:focus-visible {
      outline: 3px solid rgba(255, 255, 255, 0.75);
      outline-offset: 4px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 900px) {
      .hero {
        padding: 20px 12px 28px;
      }

      .menu-groups {
        grid-template-columns: 1fr;
      }

      .menu-button,
      .main-button {
        min-height: 74px;
        font-size: 1.15rem;
        border-radius: 18px;
      }

      .submenu .menu-button {
        min-height: 54px;
        font-size: 1rem;
        border-radius: 14px;
      }
    }
  </style>
</head>
<body>
  <section class="hero" aria-label="Kalle's Flight Night Navigation">
    <div class="shell">
      <nav class="menu" aria-label="Hauptnavigation">
        <div class="menu-groups">
          <div class="menu-group">
            <button
              class="menu-button main-button"
              type="button"
              aria-expanded="false"
              aria-controls="turnier-menu"
              data-target="turnier-menu">
              Turnier
            </button>

            <div id="turnier-menu" class="submenu" aria-label="Turnier Navigation">
              <a class="menu-button" href="livescore.html">Live Score</a>
              <a class="menu-button" href="livetabelle.html">Live Tabelle</a>
              <a class="menu-button" href="bestleistungen.html">Bestleistungen</a>
              <a class="menu-button" href="spielplan.html">Spielplan</a>
            </div>
          </div>

          <div class="menu-group">
            <button
              class="menu-button main-button"
              type="button"
              aria-expanded="false"
              aria-controls="liga-menu"
              data-target="liga-menu">
              Liga
            </button>

            <div id="liga-menu" class="submenu" aria-label="Liga Navigation">
              <a class="menu-button" href="sixty9darters.html">Sixty9Darters</a>
              <a class="menu-button" href="sixty9dartamigos.html">Sixty9Dartamigos</a>
              <a class="menu-button" href="sixty9darters3.html">Sixty9Darters 3</a>
            </div>
          </div>
        </div>
      </nav>
    </div>
  </section>

  <script>
    const mainButtons = document.querySelectorAll('.main-button');
    const submenus = document.querySelectorAll('.submenu');

    mainButtons.forEach((button) => {
      button.addEventListener('click', () => {
        const targetId = button.dataset.target;
        const targetMenu = document.getElementById(targetId);
        const isAlreadyOpen = targetMenu.classList.contains('is-open');

        submenus.forEach((submenu) => submenu.classList.remove('is-open'));
        mainButtons.forEach((mainButton) => {
          mainButton.classList.remove('is-active');
          mainButton.setAttribute('aria-expanded', 'false');
        });

        if (!isAlreadyOpen) {
          targetMenu.classList.add('is-open');
          button.classList.add('is-active');
          button.setAttribute('aria-expanded', 'true');
        }
      });
    });
  </script>
</body>
</html>
